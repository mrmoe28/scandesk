name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk sane-utils img2pdf

      - name: Install Python deps
        run: |
          pip3 install --break-system-packages -r requirements.txt
          # Or use a venv for non-system installs
          # python3 -m venv venv
          # source venv/bin/activate
          # pip install -r requirements.txt

      - name: Syntax check scandesk.py
        run: python3 -m py_compile scandesk.py

      - name: Syntax check shell scripts
        run: |
          bash -n install.sh
          bash -n uninstall.sh
          bash -n run-scandesk.sh

      - name: Test install/uninstall cycle
        run: |
          sudo bash install.sh
          test -d /opt/scandesk
          test -f /usr/local/bin/scandesk
          test -f /usr/share/applications/scandesk.desktop
          sudo bash uninstall.sh
          test ! -d /opt/scandesk
          test ! -f /usr/local/bin/scandesk
          test ! -f /usr/share/applications/scandesk.desktop

  build:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Build release tarball
        run: |
          mkdir -p dist
          tar czvf dist/scandesk-${{ github.ref_name }}-linux.tar.gz \
            --exclude='*.bak*' \
            --exclude='canon_scanner_ui*' \
            --exclude='__pycache__' \
            --exclude='.git' \
            --exclude='app.log' \
            --exclude='run-canon-scanner-ui.sh' \
            --transform 's|^|scandesk/|' \
            scandesk.py run-scandesk.sh install.sh uninstall.sh \
            scandesk.desktop requirements.txt pyproject.toml \
            LICENSE README.md assets/

      - name: Compute SHA256 checksum
        run: |
          cd dist
          sha256sum scandesk-${{ github.ref_name }}-linux.tar.gz > checksums.txt
          cat checksums.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scandesk-release
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: scandesk-release
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
